name: scroll_to_index_plus
description: >
  Programmatic scroll-to-index for any Flutter ScrollView with variable /
  unknown item heights. Uses a two-phase scroll hidden behind a seamless
  fade transition.
version: 1.0.0
homepage: https://github.com/thehaseebabbas/scroll_to_index_plus
repository: https://github.com/thehaseebabbas/scroll_to_index_plus
issue_tracker: https://github.com/thehaseebabbas/scroll_to_index_plus/issues
topics:
  - listview
  - scroll
  - ui
  - widget

license: MIT

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
